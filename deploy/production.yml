version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ocr_postgres
    restart: always
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ocr_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ocr_network

  redis:
    image: redis:7-alpine
    container_name: ocr_redis
    restart: always
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ocr_network

  minio:
    image: minio/minio:latest
    container_name: ocr_minio
    restart: always
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ocr_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr_backend
    restart: always
    ports:
      - "8200:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ocr_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/ocr_project/ocr_results:/app/ocr_res
      - /data/ocr_project/tmp_uploads:/tmp/ocr_project
      - /data/ocr_project/logs:/app/logs
    networks:
      - ocr_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr_celery
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ocr_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      PYTHONPATH: /app
    command: celery -A tasks.document_tasks worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/ocr_project/ocr_results:/app/ocr_res
      - /data/ocr_project/tmp_uploads:/tmp/ocr_project
      - /data/ocr_project/logs:/app/logs
    networks:
      - ocr_network

  nginx:
    image: nginx:alpine
    container_name: ocr_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /data/ocr_project/logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - ocr_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ocr_network:
    driver: bridge
