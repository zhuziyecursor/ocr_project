<!DOCTYPE html>
<html>
<head>
  <title>PDF.js Test - All Pages</title>
</head>
<body>
  <h1>PDF.js Test Page</h1>
  <p>Testing: /test-claude.pdf</p>
  <div id="status">Loading...</div>
  <div id="canvas-container"></div>

  <script type="module">
    import * as pdfjsLib from '/node_modules/pdfjs-dist/legacy/build/pdf.mjs';
    console.log('pdfjs-dist version:', pdfjsLib.version);

    pdfjsLib.GlobalWorkerOptions.workerSrc = '/node_modules/pdfjs-dist/legacy/build/pdf.worker.min.mjs';

    const url = '/test-claude.pdf';
    const container = document.getElementById('canvas-container');
    const status = document.getElementById('status');

    try {
      status.textContent = 'Loading PDF...';
      const loadingTask = pdfjsLib.getDocument(url);
      const pdf = await loadingTask.promise;
      console.log('PDF loaded successfully, pages:', pdf.numPages);
      status.textContent = `PDF loaded: ${pdf.numPages} pages`;

      for (let i = 1; i <= pdf.numPages; i++) {
        console.log(`Rendering page ${i}...`);
        status.textContent = `Rendering page ${i}/${pdf.numPages}...`;

        try {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.0 });

          const canvas = document.createElement('canvas');
          canvas.id = 'page-' + i;
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          canvas.style.border = '1px solid #ccc';
          canvas.style.margin = '10px';
          container.appendChild(canvas);

          await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
          console.log(`Page ${i} rendered successfully`);
        } catch (e) {
          console.error(`Error rendering page ${i}:`, e.message);
          status.textContent += `\nError on page ${i}: ${e.message}`;
        }
      }
      status.textContent = 'Done!';
    } catch (e) {
      console.error('Error:', e.message);
      status.textContent = 'Error: ' + e.message;
    }
  </script>
</body>
</html>
